<!DOCTYPE html>
<html>
<head>
    <title>View Entries</title>
</head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<body class="light">
<button onclick="toggleMode()">Toggle Dark Mode</button>

<h2>Your Diary Entries</h2>

<form method="GET">
    <input type="text" name="search_date" placeholder="Enter date (DD-MM-YYYY)">
    <button type="submit" class="btn">Search</button>
</form>
<br>

<div class="container">

{% for entry in entries %}
<div class="card">
    <h3>{{ entry[1] }}</h3>
    <p>{{ entry[2] }}</p>
    <small>{{ entry[3] }}</small>

    <a href="/edit/{{ entry[0] }}" class="btn">Edit</a>
    <a href="/delete/{{ entry[0] }}" class="btn delete">Delete</a>
</div>
{% endfor %}

</div>
<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
